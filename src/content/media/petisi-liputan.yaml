summary_id: "Menjelang Hari Raya Idul Adha, berkah mulai dirasakan para peternak hewan kurban di berbagai daerah. Salah satunya di Desa Ngrayung, Kecamatan Plumpang, Kabupaten Tuban."
summary_en: "Ahead of Eid al-Adha, blessings are being felt by sacrificial animal farmers across various regions, including Ngrayung Village, Plumpang District, Tuban Regency."
